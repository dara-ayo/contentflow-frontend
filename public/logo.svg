<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer rounded square background -->
  <rect width="32" height="32" rx="8" fill="#7c6af5"/>

  <!-- Document body -->
  <rect x="8" y="7" width="13" height="16" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="8" y="7" width="13" height="16" rx="2" stroke="white" stroke-width="1.5" stroke-opacity="0.9"/>

  <!-- Document lines -->
  <line x1="11" y1="12" x2="18" y2="12" stroke="white" stroke-width="1.25" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="11" y1="15" x2="18" y2="15" stroke="white" stroke-width="1.25" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="11" y1="18" x2="15" y2="18" stroke="white" stroke-width="1.25" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Flow arrow emerging from right side -->
  <path d="M20 16 L25 16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22.5 13.5 L25 16 L22.5 18.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
